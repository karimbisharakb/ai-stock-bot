<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Investing Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root {
  --bg: #0a0a0f; --surface: #12121e; --border: #2a2a4a;
  --text: #e0e0f0; --sub: #666688;
  --purple: #7b2ff7; --blue: #00d4ff; --green: #00e676; --red: #ff5252; --yellow: #ffd740;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

header {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  padding: 24px 40px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
header h1 {
  font-size: 22px; font-weight: 800;
  background: linear-gradient(90deg, var(--blue), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
#refresh-btn {
  background: linear-gradient(135deg, var(--blue), var(--purple));
  border: none; color: #fff; padding: 10px 24px;
  border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600;
  font-family: inherit;
}
#refresh-btn:hover { opacity: 0.85; }

#loading { text-align: center; padding: 100px; font-size: 18px; color: #888; }
.spinner {
  width: 48px; height: 48px; border: 4px solid #2a2a4a;
  border-top-color: var(--blue); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }

main { padding: 32px 40px; max-width: 1400px; margin: 0 auto; }

.top-pick {
  background: linear-gradient(135deg, #1a1a2e, #0f3460);
  border: 1px solid #00d4ff44; border-radius: 16px;
  padding: 24px; margin-bottom: 32px;
}
.top-pick h2 { color: var(--blue); font-size: 13px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
.top-pick h3 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
.top-pick p  { color: #aaa; line-height: 1.6; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 20px;
  transition: transform .2s, border-color .2s;
}
.card:hover { transform: translateY(-3px); border-color: #00d4ff44; }

.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.ticker { font-size: 22px; font-weight: 800; }
.price  { font-size: 20px; font-weight: 700; }
.change { font-size: 13px; margin-top: 2px; }
.change.up   { color: var(--green); }
.change.down { color: var(--red); }

.badge {
  padding: 5px 12px; border-radius: 20px;
  font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
}
.badge.strong-buy  { background: #00e67622; color: var(--green);  border: 1px solid #00e67644; }
.badge.buy         { background: #69f0ae22; color: #69f0ae;        border: 1px solid #69f0ae44; }
.badge.hold        { background: #ffd74022; color: var(--yellow);  border: 1px solid #ffd74044; }
.badge.sell        { background: #ff525222; color: var(--red);     border: 1px solid #ff525244; }
.badge.strong-sell { background: #d50000aa; color: #ff8a80;        border: 1px solid #d5000066; }

.score-bar  { background: #1e1e2e; border-radius: 8px; height: 6px; margin: 12px 0; overflow: hidden; }
.score-fill { height: 100%; border-radius: 8px; background: linear-gradient(90deg, var(--purple), var(--blue)); }

.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
.stat { background: #1a1a2e; border-radius: 8px; padding: 8px 12px; }
.stat-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
.stat-value { font-size: 14px; font-weight: 600; margin-top: 2px; }

.summary  { font-size: 13px; color: #999; line-height: 1.6; margin: 12px 0; }
.risk     { font-size: 12px; color: var(--red); background: #ff525210; border-radius: 6px; padding: 6px 10px; margin-top: 8px; }
.news-item { font-size: 12px; color: #777; margin-top: 4px; padding-left: 10px; border-left: 2px solid #2a2a4a; }

canvas { margin-top: 14px; }

@media (max-width: 768px) {
  header { padding: 16px 20px; }
  main   { padding: 20px; }
  .grid  { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <h1>📈 AI Investing Dashboard</h1>
  <button id="refresh-btn" onclick="loadData()">🔄 Refresh Analysis</button>
</header>

<div id="loading">
  <div class="spinner"></div>
  Pulling data and running AI analysis — ~30 seconds...
</div>

<main id="main" style="display:none">
  <div class="top-pick" id="top-pick"></div>
  <div class="grid" id="grid"></div>
</main>

<script>
function badgeClass(action) {
  return action.toLowerCase().replace(/ /g, '-');
}

function renderCard(item) {
  const changeClass = item.change_1m_pct >= 0 ? 'up' : 'down';
  const changeSign  = item.change_1m_pct >= 0 ? '+' : '';
  const upside = item.analyst_target !== 'N/A' && item.current_price
    ? (((item.analyst_target - item.current_price) / item.current_price) * 100).toFixed(1)
    : 'N/A';
  const newsHtml = (item.news || []).slice(0, 2)
    .map(h => `<div class="news-item">${h}</div>`).join('');
  const id = 'chart-' + item.ticker;

  return `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="ticker">${item.ticker}</div>
          <div class="price">$${item.current_price}</div>
          <div class="change ${changeClass}">${changeSign}${item.change_1m_pct}% this month</div>
        </div>
        <div>
          <div class="badge ${badgeClass(item.action)}">${item.action}</div>
          <div style="text-align:right;margin-top:8px;font-size:22px;font-weight:800">
            ${item.score}<span style="font-size:13px;color:#666">/10</span>
          </div>
        </div>
      </div>

      <div class="score-bar"><div class="score-fill" style="width:${item.score * 10}%"></div></div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">Price Target</div>
          <div class="stat-value">$${item.price_target}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Analyst Upside</div>
          <div class="stat-value">${upside !== 'N/A' ? upside + '%' : 'N/A'}</div>
        </div>
        <div class="stat">
          <div class="stat-label">P/E Ratio</div>
          <div class="stat-value">${typeof item.pe_ratio === 'number' ? item.pe_ratio.toFixed(1) : item.pe_ratio}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Beta</div>
          <div class="stat-value">${typeof item.beta === 'number' ? item.beta.toFixed(2) : item.beta}</div>
        </div>
      </div>

      <canvas id="${id}" height="80"></canvas>
      <p class="summary">${item.summary}</p>
      <div class="risk">⚠️ ${item.key_risk}</div>
      ${newsHtml ? `<div style="margin-top:12px">${newsHtml}</div>` : ''}
    </div>
  `;
}

function drawChart(item) {
  const ctx = document.getElementById('chart-' + item.ticker);
  if (!ctx || !item.prices) return;
  const up = item.change_1m_pct >= 0;
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: item.dates,
      datasets: [{
        data: item.prices,
        borderColor: up ? '#00e676' : '#ff5252',
        backgroundColor: up ? '#00e67611' : '#ff525211',
        borderWidth: 2, pointRadius: 0, fill: true, tension: 0.4,
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: { x: { display: false }, y: { display: false } }
    }
  });
}

async function loadData() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('main').style.display = 'none';

  const res  = await fetch('/api/data');
  const data = await res.json();

  const top = data[0];
  document.getElementById('top-pick').innerHTML = `
    <h2>🏆 Top Pick</h2>
    <h3>${top.ticker} — $${top.current_price}
      <span class="badge ${badgeClass(top.action)}" style="font-size:14px">${top.action}</span>
    </h3>
    <p>${top.summary}</p>
  `;

  document.getElementById('grid').innerHTML = data.map(renderCard).join('');
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  data.forEach(drawChart);
}

loadData();
</script>
</body>
</html>
