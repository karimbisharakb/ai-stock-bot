name: AI Stock Bot

on:
  schedule:
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic yfinance python-dotenv requests

      - name: Run stock bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          QUESTRADE_REFRESH_TOKEN: ${{ secrets.QUESTRADE_REFRESH_TOKEN }}
          QUESTRADE_ACCOUNT_ID: ${{ secrets.QUESTRADE_ACCOUNT_ID }}
        run: python stocks.py

      - name: Save portfolio to GitHub
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "bot@github.com"
          git add stock_trades.json
          git diff --staged --quiet || git commit -m "portfolio update $(date +'%Y-%m-%d %H:%M')"
          git push