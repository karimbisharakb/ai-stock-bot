<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Stock Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d0d12;color:#e8e8f0;font-family:'Inter',sans-serif;min-height:100vh}
  header{padding:28px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e1e2e}
  .logo-text{font-size:18px;font-weight:700;color:#fff}
  .logo-sub{font-size:12px;color:#4b4b6b;margin-top:1px}
  .badge-live{background:#10b98115;color:#10b981;border:1px solid #10b98130;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600}
  .btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;color:white;padding:9px 20px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:'Inter',sans-serif}
  main{padding:32px 40px;max-width:1400px;margin:0 auto}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
  .kpi{background:#13131f;border:1px solid #1e1e2e;border-radius:14px;padding:22px}
  .kpi-label{font-size:11px;font-weight:500;color:#4b4b6b;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px}
  .kpi-value{font-size:30px;font-weight:800;letter-spacing:-1px}
  .purple{color:#8b5cf6} .green{color:#10b981} .white{color:#fff} .blue{color:#6366f1}
  .kpi-sub{font-size:12px;color:#4b4b6b;margin-top:6px}
  .section-title{font-size:13px;font-weight:600;color:#4b4b6b;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px}
  .card{background:#13131f;border:1px solid #1e1e2e;border-radius:14px;overflow:hidden;margin-bottom:32px}
  table{width:100%;border-collapse:collapse}
  thead th{background:#0f0f1a;padding:12px 20px;text-align:left;font-size:11px;font-weight:600;color:#4b4b6b;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #1e1e2e}
  tbody td{padding:16px 20px;border-bottom:1px solid #0f0f1a;font-size:14px}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:#0f0f1a}
  .ticker-name{font-weight:700;color:#fff}
  .action-badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase}
  .action-badge.buy{background:#10b98115;color:#10b981;border:1px solid #10b98130}
  .score-bar-wrap{display:flex;align-items:center;gap:10px}
  .score-bar{width:60px;height:5px;background:#1e1e2e;border-radius:3px;overflow:hidden}
  .score-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#6366f1,#8b5cf6)}
  .score-num{font-size:13px;font-weight:700;color:#8b5cf6}
  .upside{color:#10b981;font-weight:600}
  .muted{color:#4b4b6b;font-size:13px}
  .reasoning{color:#4b4b6b;font-size:12px;max-width:280px;line-height:1.5}
  .two-col{display:grid;grid-template-columns:1fr 300px;gap:20px;margin-bottom:32px}
  .chart-card{background:#13131f;border:1px solid #1e1e2e;border-radius:14px;padding:24px}
  .empty{padding:48px;text-align:center;color:#2a2a4a;font-size:15px}
  .ts{text-align:center;color:#2a2a4a;font-size:11px;padding:24px}
</style>
</head>
<body>
<header>
  <div>
    <div class="logo-text">📈 Stock Intelligence</div>
    <div class="logo-sub">AI-Powered Portfolio</div>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <span class="badge-live">● Paper Trading</span>
    <button class="btn" onclick="loadData()">↻ Refresh</button>
  </div>
</header>
<main>
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">Available Cash</div><div class="kpi-value purple" id="cash">—</div><div class="kpi-sub">of $1,000 starting</div></div>
    <div class="kpi"><div class="kpi-label">Open Positions</div><div class="kpi-value white" id="pos">—</div><div class="kpi-sub">max 5 allowed</div></div>
    <div class="kpi"><div class="kpi-label">Capital Deployed</div><div class="kpi-value green" id="dep">—</div><div class="kpi-sub" id="dep-pct"></div></div>
    <div class="kpi"><div class="kpi-label">Total Trades</div><div class="kpi-value blue" id="tot">—</div><div class="kpi-sub">this session</div></div>
  </div>
  <div class="two-col">
    <div>
      <div class="section-title">Open Positions</div>
      <div class="card" id="pos-card"><div class="empty">Run stocks.py first</div></div>
    </div>
    <div>
      <div class="section-title">Allocation</div>
      <div class="chart-card"><canvas id="chart"></canvas></div>
    </div>
  </div>
  <div class="section-title">Trade Log</div>
  <div class="card" id="trades-card"><div class="empty">No trades yet</div></div>
  <div class="ts" id="ts"></div>
</main>
<script>
const chartColors=['#8b5cf6','#6366f1','#10b981','#f59e0b','#ef4444','#06b6d4','#ec4899'];
let chartInstance=null;
function fmt(n){return typeof n==='number'?n.toFixed(2):n;}
function renderAll(data){
  const cash=data.cash||0,positions=data.positions||[],trades=data.trades||[];
  const deployed=trades.reduce((s,t)=>s+(t.cost||0),0);
  document.getElementById('cash').textContent='$'+cash.toFixed(2);
  document.getElementById('pos').textContent=positions.length;
  document.getElementById('dep').textContent='$'+deployed.toFixed(2);
  document.getElementById('dep-pct').textContent=((deployed/1000)*100).toFixed(1)+'% of portfolio';
  document.getElementById('tot').textContent=trades.length;
  document.getElementById('ts').textContent='Last updated: '+new Date().toLocaleString();
  if(positions.length>0){
    const rows=positions.map(t=>{
      const upside=t.target&&t.price?(((t.target-t.price)/t.price)*100).toFixed(1):null;
      return '<tr><td><span class="ticker-name">'+t.ticker+'</span></td><td>'+t.shares+'</td><td style="color:#fff;font-weight:600">$'+fmt(t.price)+'</td><td>$'+fmt(t.cost)+'</td><td style="color:#8b5cf6;font-weight:600">$'+fmt(t.target)+'</td><td class="upside">'+(upside?upside+'%':'N/A')+'</td><td><div class="score-bar-wrap"><div class="score-bar"><div class="score-fill" style="width:'+(t.score||0)*10+'%"></div></div><span class="score-num">'+(t.score||'—')+'</span></div></td><td><span class="action-badge buy">Open</span></td></tr>';
    }).join('');
    document.getElementById('pos-card').innerHTML='<table><thead><tr><th>Ticker</th><th>Shares</th><th>Buy Price</th><th>Cost</th><th>Target</th><th>Upside</th><th>Score</th><th>Status</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }
  if(trades.length>0){
    const rows=trades.map(t=>{
      const upside=t.target&&t.price?(((t.target-t.price)/t.price)*100).toFixed(1):null;
      return '<tr><td class="muted">'+t.time+'</td><td><span class="ticker-name">'+t.ticker+'</span></td><td><span class="action-badge buy">'+(t.action||'BUY')+'</span></td><td>'+t.shares+'</td><td style="color:#fff">$'+fmt(t.price)+'</td><td>$'+fmt(t.cost)+'</td><td style="color:#8b5cf6">$'+fmt(t.target)+'</td><td class="upside">'+(upside?upside+'%':'N/A')+'</td><td class="reasoning">'+(t.reasoning||'')+'</td></tr>';
    }).join('');
    document.getElementById('trades-card').innerHTML='<table><thead><tr><th>Time</th><th>Ticker</th><th>Action</th><th>Shares</th><th>Price</th><th>Cost</th><th>Target</th><th>Upside</th><th>Reasoning</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }
  if(trades.length>0){
    const labels=[...trades.map(t=>t.ticker),'Cash'];
    const values=[...trades.map(t=>t.cost||0),cash];
    const colors=[...trades.map((_,i)=>chartColors[i%chartColors.length]),'#1e1e2e'];
    if(chartInstance)chartInstance.destroy();
    chartInstance=new Chart(document.getElementById('chart'),{type:'doughnut',data:{labels,datasets:[{data:values,backgroundColor:colors,borderColor:'#0d0d12',borderWidth:3}]},options:{cutout:'70%',plugins:{legend:{labels:{color:'#4b4b6b',font:{size:11},padding:12}}}}});
  }
}
function loadData(){
  fetch('stock_trades.json?t='+Date.now()).then(r=>r.json()).then(renderAll).catch(()=>{});
}
loadData();
</script>
</body>
</html>
